version: "2"
linters:
  default: all
  disable:
    - copyloopvar
    - cyclop
    - depguard
    - funlen
    - gocognit
    - intrange
    - ireturn
    - lll
    - maintidx
    - mnd
    - nlreturn
    - paralleltest
    - testpackage
    - tparallel
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    errcheck:
      check-type-assertions: true
    exhaustruct:
      include:
        - rootcause\..*[pP]arams
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print
        - pattern: ^print$
        - pattern: ^println$
        - pattern: ^panic$
    godox:
      keywords:
        - FIXME
    varnamelen:
      ignore-decls:
        - T any
        - i int
        - wg sync.WaitGroup
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: do not define dynamic errors.*
formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(rootcause)
  exclusions:
    generated: lax
